name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Check frontend exists
        id: check
        run: test -f package.json && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT
      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm install
      - name: Run tests
        if: steps.check.outputs.exists == 'true'
        run: npm run test
      - name: Skip (frontend not scaffolded yet)
        if: steps.check.outputs.exists == 'false'
        run: echo "Frontend not yet scaffolded — skipping."

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check backend exists
        id: check
        run: test -f backend/Tracker.Api/Tracker.Api.csproj && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT
      - uses: actions/setup-dotnet@v4
        if: steps.check.outputs.exists == 'true'
        with:
          dotnet-version: 8.x
      - name: Restore
        if: steps.check.outputs.exists == 'true'
        run: dotnet restore backend/Tracker.Api/Tracker.Api.csproj
      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: dotnet build backend/Tracker.Api/Tracker.Api.csproj --no-restore
      - name: Test
        if: steps.check.outputs.exists == 'true'
        run: dotnet test backend/tests/Tracker.Api.Tests/Tracker.Api.Tests.csproj --verbosity normal
      - name: Skip (backend not scaffolded yet)
        if: steps.check.outputs.exists == 'false'
        run: echo "Backend not yet scaffolded — skipping."
