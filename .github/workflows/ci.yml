name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm --prefix frontend install
      - name: Run tests
        run: npm --prefix frontend run test

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x
      - name: Restore
        run: dotnet restore backend/Tracker.Api/Tracker.Api.csproj
      - name: Build
        run: dotnet build backend/Tracker.Api/Tracker.Api.csproj --no-restore
      - name: Test
        run: dotnet test backend/tests/Tracker.Api.Tests/Tracker.Api.Tests.csproj --no-build --verbosity normal
        working-directory: .
